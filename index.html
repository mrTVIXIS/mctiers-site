<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS TIERS - Rankings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0c10;
            --bg-navbar: #111217;
            --accent-orange: #ff4a11;
            --text-main: #ffffff;
            --text-muted: #8a8d98;
            --border-color: #1f2026;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        .navbar {
            background-color: var(--bg-navbar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-orange);
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links a.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-orange);
            padding-bottom: 4px;
        }

        .search-container input {
            background-color: #16171e;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            width: 220px;
            outline: none;
        }

        .modes-bar {
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 30px 40px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border-color);
        }

        .mode-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s ease;
            min-width: 60px;
        }

        .mode-item:hover, .mode-item.active {
            opacity: 1;
        }

        .mode-item i { font-size: 1.6rem; }
        .mode-item span { font-size: 0.8rem; font-weight: 700; }

        .icon-overall { color: #3b82f6; }
        .icon-ltms { color: #f3f4f6; }
        .icon-vanilla { color: #eab308; }
        .icon-uhc { color: #ef4444; }
        .icon-pot { color: #06b6d4; }
        .icon-netherop { color: #a855f7; }
        .icon-smp { color: #22c55e; }
        .icon-sword { color: #f59e0b; }
        .icon-axe { color: #ec4899; }
        .icon-mace { color: #6366f1; }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .info-badge {
            background-color: #16171e;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .server-ip {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .server-ip span { color: var(--accent-orange); }

        .ranking-table-container { padding: 0 40px 40px 40px; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 10px;
            border-bottom: 1px solid #111217;
            font-size: 0.95rem;
            vertical-align: middle;
        }

        .col-num { width: 8%; color: var(--text-muted); font-weight: 700; }
        .col-player { width: 42%; }
        .col-region { width: 15%; color: var(--text-muted); font-weight: 600; }
        .col-tiers { width: 20%; }
        .col-points { width: 15%; text-align: right; font-weight: 700; color: #10b981; }

        .player-flex {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 26px;
            height: 26px;
            border-radius: 4px;
            background-color: #1c1d24;
        }

        .player-name { font-weight: 700; }

        .tier-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
        }

        .tier-ht { background-color: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .tier-lt { background-color: rgba(168, 85, 247, 0.15); color: #a855f7; }

        .no-players {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            color: var(--text-muted);
            gap: 15px;
        }

        .no-players i { font-size: 3rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand"><i class="fas fa-bolt"></i> KRONOS TIERS</div>
        <ul class="nav-links">
            <li><a href="#"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#" class="active"><i class="fas fa-trophy"></i> Rankings</a></li>
            <li><a href="#"><i class="fab fa-discord"></i> Discords</a></li>
            <li><a href="#"><i class="fas fa-book"></i> API Docs</a></li>
        </ul>
        <div class="search-container">
            <input type="text" id="playerSearch" placeholder="Search player..." oninput="drawTable()">
        </div>
    </nav>

    <div class="modes-bar">
        <div class="mode-item active" onclick="changeMode('overall', this)">
            <i class="fas fa-id-badge icon-overall"></i>
            <span>Overall</span>
        </div>
        <div class="mode-item" onclick="changeMode('ltms', this)">
            <i class="fas fa-skull icon-ltms"></i>
            <span>LTMs</span>
        </div>
        <div class="mode-item" onclick="changeMode('vanilla', this)">
            <i class="fas fa-palette icon-vanilla"></i>
            <span>Vanilla</span>
        </div>
        <div class="mode-item" onclick="changeMode('uhc', this)">
            <i class="fas fa-heart icon-uhc"></i>
            <span>UHC</span>
        </div>
        <div class="mode-item" onclick="changeMode('pot', this)">
            <i class="fas fa-vial icon-pot"></i>
            <span>Pot</span>
        </div>
        <div class="mode-item" onclick="changeMode('netherop', this)">
            <i class="fas fa-circle icon-netherop"></i>
            <span>NetherOP</span>
        </div>
        <div class="mode-item" onclick="changeMode('smp', this)">
            <i class="fas fa-square-check icon-smp"></i>
            <span>SMP</span>
        </div>
        <div class="mode-item" onclick="changeMode('sword', this)">
            <i class="fas fa-crosshairs icon-sword"></i>
            <span>Sword</span>
        </div>
        <div class="mode-item" onclick="changeMode('axe', this)">
            <i class="fas fa-hammer icon-axe"></i>
            <span>Axe</span>
        </div>
        <div class="mode-item" onclick="changeMode('mace', this)">
            <i class="fas fa-gavel icon-mace"></i>
            <span>Mace</span>
        </div>
    </div>

    <div class="info-row">
        <div class="info-badge"><i class="fas fa-info-circle"></i> Information</div>
        <div class="server-ip"><i class="fas fa-server"></i> SERVER IP: <span>137.66.7.149:1008</span></div>
    </div>

    <div class="ranking-table-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th class="col-num">#</th>
                    <th class="col-player">PLAYER</th>
                    <th class="col-region">REGION</th>
                    <th class="col-tiers">TIERS</th>
                    <th class="col-points" style="text-align: right;">POINTS</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="no-players" id="emptyState">
            <i class="fas fa-search"></i>
            <p>Игроков не найдено</p>
        </div>
    </div>

    <script>
        let playersList = [];
        let activeMode = 'overall';

        async function fetchRankings() {
            try {
                const res = await fetch('/api/players');
                if (res.ok) {
                    playersList = await res.json();
                }
            } catch (e) {
                console.error("Ошибка сети при получении данных игроков");
            }
            drawTable();
        }

        function changeMode(mode, element) {
            activeMode = mode;
            document.querySelectorAll('.mode-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            drawTable();
        }

        function drawTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const tableElement = document.getElementById('mainTable');
            const query = document.getElementById('playerSearch').value.toLowerCase();
            
            tbody.innerHTML = '';

            let filtered = playersList.filter(p => p.name.toLowerCase().includes(query));

            // Автоматическая сортировка по очкам текущего режима (если они есть) или общего пула очков
            filtered.sort((a, b) => {
                const pointsA = parseInt(a[activeMode + '_points']) || parseInt(a.points) || 0;
                const pointsB = parseInt(b[activeMode + '_points']) || parseInt(b.points) || 0;
                return pointsB - pointsA;
            });

            if (filtered.length === 0) {
                tableElement.style.display = 'none';
                emptyState.style.display = 'flex';
                return;
            }

            tableElement.style.display = 'table';
            emptyState.style.display = 'none';

            filtered.forEach((player, i) => {
                const tr = document.createElement('tr');
                const tierValue = player[activeMode] || '—';
                const pointsValue = player[activeMode + '_points'] || player.points || '0';
                
                let badgeClass = 'tier-tag';
                if (tierValue.startsWith('HT')) badgeClass += ' tier-ht';
                if (tierValue.startsWith('LT')) badgeClass += ' tier-lt';

                tr.innerHTML = `
                    <td class="col-num">${i + 1}</td>
                    <td class="col-player">
                        <div class="player-flex">
                            <img class="avatar" src="https://minotar.net/helm/${player.name}/26.png" onerror="this.src='https://minotar.net/helm/MHF_Question/26.png'">
                            <span class="player-name">${player.name}</span>
                        </div>
                    </td>
                    <td class="col-region">${player.region || 'EU'}</td>
                    <td class="col-tiers"><span class="${badgeClass}">${tierValue}</span></td>
                    <td class="col-points" style="text-align: right;">${pointsValue}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.onload = fetchRankings;
        // Автообновление таблицы каждые 30 секунд, чтобы видеть изменения без перезагрузки
        setInterval(fetchRankings, 30000);
    </script>
</body>
</html>
